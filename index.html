<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator" role="application" aria-label="Calculator">

  <div class="display" aria-live="polite" aria-atomic="true">
    <div class="display-history"    id="history"></div>
    <div class="display-expression" id="expression"></div>
    <div class="display-value"      id="display">0</div>
  </div>

  <div class="buttons">
    <!-- Row 1 -->
    <button class="btn-fn"  data-action="clear"    aria-label="All Clear">AC</button>
    <button class="btn-fn"  data-action="sign"     aria-label="Toggle sign">±</button>
    <button class="btn-fn"  data-action="percent"  aria-label="Percent">%</button>
    <button class="btn-op"  data-action="operator" data-value="÷" aria-label="Divide">÷</button>
    <!-- Row 2 -->
    <button class="btn-num" data-action="digit" data-value="7">7</button>
    <button class="btn-num" data-action="digit" data-value="8">8</button>
    <button class="btn-num" data-action="digit" data-value="9">9</button>
    <button class="btn-op"  data-action="operator" data-value="×" aria-label="Multiply">×</button>
    <!-- Row 3 -->
    <button class="btn-num" data-action="digit" data-value="4">4</button>
    <button class="btn-num" data-action="digit" data-value="5">5</button>
    <button class="btn-num" data-action="digit" data-value="6">6</button>
    <button class="btn-op"  data-action="operator" data-value="−" aria-label="Subtract">−</button>
    <!-- Row 4 -->
    <button class="btn-num" data-action="digit" data-value="1">1</button>
    <button class="btn-num" data-action="digit" data-value="2">2</button>
    <button class="btn-num" data-action="digit" data-value="3">3</button>
    <button class="btn-op"  data-action="operator" data-value="+" aria-label="Add">+</button>
    <!-- Row 5 -->
    <button class="btn-num btn-zero" data-action="digit"   data-value="0" aria-label="0">0</button>
    <button class="btn-num"          data-action="decimal" aria-label="Decimal point">.</button>
    <button class="btn-eq"           data-action="equals"  aria-label="Equals">=</button>
  </div>

  <div class="footer">
    <span class="footer-label">Calculator Style</span>
    <span class="keyboard-hint">
      <kbd class="kbd">0–9</kbd> keyboard supported
    </span>
  </div>

</div>

      <script src="script.js"></script>
</body>
</html>
